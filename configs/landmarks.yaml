global_config: configs/global.yaml
task: landmarks
model:
  name: vgg_regressor
  input_size: [224, 224]
  dense_units: [512, 128]
  dropout: 0.3
data:
  source: csv
  image_dir: data/landmarks/images
  csv_path: data/landmarks/train.csv
  processed_dir: data/landmarks/processed
  train_ratio: 0.8
  image_extensions: [".jpg", ".jpeg", ".png"]
training:
  batch_size: 16
  epochs: 30
  learning_rate: 0.0005
  val_ratio: 0.2
  random_seed: 42
  early_stopping_patience: 6
  reduce_lr_patience: 3
  num_parallel_calls: 4
  prefetch_buffer: 2
augmentation:
  horizontal_flip: true
  brightness_delta: 0.08
artifacts:
  output_dir: artifacts/landmarks
  best_weights: artifacts/landmarks/best.weights.h5
  final_weights: artifacts/landmarks/final.weights.h5
  history_csv: artifacts/landmarks/history.csv
  history_plot: artifacts/landmarks/history.png
  eval_json: artifacts/landmarks/eval.json
  predictions_csv: artifacts/landmarks/val_predictions.csv
  preview_dir: artifacts/landmarks/previews
